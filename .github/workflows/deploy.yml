name: Deploy Website to Vercel

on:
  push:
    branches:
      - main

jobs:
  check-and-deploy:
    name: Verify Quality & Trigger Vercel Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: website/package.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./website

      - name: Run Lint and Format Checks
        run: npm run lint
        working-directory: ./website

      - name: Run Type Checks
        run: npx tsc --noEmit
        working-directory: ./website

      - name: Trigger Vercel Deploy Hook
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_ZL6Iwwpz3sDTEQorJrj8I4ihTyLv/75kT6OG12h"


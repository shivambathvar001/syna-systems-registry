name: SynaSystems Watchdog (Daily 9 AM IST)

# ─── Schedule ───────────────────────────────────────────────────────────────
# 30 3 * * 1-5  →  03:30 UTC = 09:00 AM IST (Mon–Fri)
on:
  schedule:
    - cron: "30 3 * * 1-5"

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip git commit)"
        required: false
        default: "false"
        type: boolean

# ─── Concurrency ─────────────────────────────────────────────────────────────
# Prevent overlapping runs if a previous watchdog is still executing
concurrency:
  group: syna-watchdog
  cancel-in-progress: false

# ─── Permissions ─────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed for git commit + push

# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:
  watchdog:
    name: "Run Watchdog & Commit Brain Updates"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Set IST timezone for log timestamps inside watchdog.py
      TZ: Asia/Kolkata
      PYTHONUNBUFFERED: "1"

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so we can diff & push cleanly
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements_watchdog.txt

      # ── 3. Install dependencies ─────────────────────────────────────────
      - name: Install watchdog dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements_watchdog.txt ]; then
            pip install -r scripts/requirements_watchdog.txt
          else
            echo "[WARN] requirements_watchdog.txt not found — skipping dep install."
          fi

      # ── 4. Run watchdog.py ──────────────────────────────────────────────
      - name: Execute watchdog.py
        id: watchdog
        run: |
          echo "──────────────────────────────────────────────"
          echo "  SynaSystems Watchdog — $(date +'%Y-%m-%d %H:%M:%S %Z')"
          echo "──────────────────────────────────────────────"
          python scripts/watchdog.py
        env:
          # Pass any secrets watchdog.py might need as environment variables
          # Example: INSTANTLY_API_KEY: ${{ secrets.INSTANTLY_API_KEY }}
          # Add your own secrets here:
          GITHUB_ACTIONS: "true"
          RUN_ENV: "ci"

      # ── 5. Check for agency-brain changes ──────────────────────────────
      - name: Check for agency-brain changes
        id: diff_check
        run: |
          git diff --quiet agency-brain/ || echo "changed=true" >> $GITHUB_OUTPUT
          echo "Files changed:"
          git diff --name-only agency-brain/ || true

      # ── 6. Commit & push brain updates ──────────────────────────────────
      - name: Commit agency-brain updates
        if: |
          steps.diff_check.outputs.changed == 'true' &&
          github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "SynaSystems Watchdog [bot]"
          git config user.email "watchdog@syna-systems.bot"

          git add agency-brain/

          # Build a rich commit message
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M IST')
          CHANGED_FILES=$(git diff --cached --name-only | tr '\n' ', ' | sed 's/,$//')
          git commit -m "chore(watchdog): auto-update agency-brain [$TIMESTAMP]

          Files updated: $CHANGED_FILES
          Triggered by: GitHub Actions cron (9 AM IST)
          Run ID: ${{ github.run_id }}"

          git push origin HEAD:${{ github.ref_name }}

      # ── 7. No changes summary ──────────────────────────────────────────
      - name: Report — no changes to commit
        if: steps.diff_check.outputs.changed != 'true'
        run: |
          echo "✅ Watchdog ran successfully."
          echo "   No changes detected in agency-brain/ — nothing to commit."

      # ── 8. Dry run notice ──────────────────────────────────────────────
      - name: Report — dry run skipped commit
        if: |
          steps.diff_check.outputs.changed == 'true' &&
          github.event.inputs.dry_run == 'true'
        run: |
          echo "🔍 Dry run mode: changes detected but commit skipped."
          git diff --name-only agency-brain/

      # ── 9. Upload watchdog logs as artifact ────────────────────────────
      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchdog-logs-${{ github.run_id }}
          path: |
            agency-brain/logs/
            agency-brain/current-state.md
          if-no-files-found: ignore
          retention-days: 14
